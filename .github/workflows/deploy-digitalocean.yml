name: Deploy to DigitalOcean Droplet

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USERNAME }}
          key: ${{ secrets.DO_SSH_KEY }}
          port: ${{ secrets.DO_PORT || '22' }}
          script_stop: true
          script: |
            set -e
            APP_DIR="/var/www/ingyin-ui"
            WEB_ROOT="${{ secrets.DEPLOY_WEB_ROOT || '/var/www/html' }}"
            SECRETS_ENV="/var/www/ingyin-secrets/.env"
            BRANCH="${{ secrets.DEPLOY_BRANCH || 'main' }}"
            WEB_SERVICE="${{ secrets.DEPLOY_WEB_SERVICE || 'nginx' }}"

            cd "$APP_DIR"
            git fetch origin "$BRANCH"
            git checkout "$BRANCH"
            git reset --hard "origin/$BRANCH"
            git clean -fd

            if [ ! -f "$SECRETS_ENV" ]; then
              echo "Missing secrets file: $SECRETS_ENV"
              exit 1
            fi
            cp "$SECRETS_ENV" "$APP_DIR/.env"

            npm ci
            npm run build

            mkdir -p "$WEB_ROOT"
            rm -rf "$WEB_ROOT"/*
            cp -r "$APP_DIR/dist/"* "$WEB_ROOT"/
            sudo systemctl restart "$WEB_SERVICE"
            sudo systemctl status "$WEB_SERVICE" --no-pager

            echo "Deployment complete on $(hostname) at $(date)"
